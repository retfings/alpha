<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Backtest Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #333; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin: 20px 0; }
    .stat-card { background: #f5f5f5; padding: 15px; border-radius: 5px; }
    .stat-value { font-size: 24px; font-weight: bold; color: #2196F3; }
    .stat-label { color: #666; font-size: 14px; }
    .negative { color: #f44336; }
    .positive { color: #4CAF50; }
    table { border-collapse: collapse; width: 100%; margin: 20px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    tr:nth-child(even) { background: #fafafa; }
  </style>
</head>
<body>
  <h1>Backtest Report</h1>
  <p>Generated: </p>
  <h2>Performance Summary</h2>
  <div class="stats">
    <div class="stat-card">
      <div class="stat-value">0%</div>
      <div class="stat-label">Total Return</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">0%</div>
      <div class="stat-label">Max Drawdown</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">0</div>
      <div class="stat-label">Sharpe Ratio</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">0</div>
      <div class="stat-label">Total Trades</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">50%</div>
      <div class="stat-label">Win Rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">100000</div>
      <div class="stat-label">Final Capital</div>
    </div>
  </div>
  <h2>Equity Curve</h2>
  <div id="equity-chart" style="width: 100%; height: 400px; background: #eee;">
    Chart placeholder - integrate with Chart.js
  </div>
</body>
</html>
