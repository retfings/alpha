      type: object
      properties:
        status:
          type: string
          enum: [created]
        config_id:
          type: string
        name:
          type: string

    UpdateWeightRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        weights:
          type: object
          additionalProperties:
            type: number

    UpdateWeightResponse:
      type: object
      properties:
