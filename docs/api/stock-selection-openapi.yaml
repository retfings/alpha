openapi: 3.0.3
info:
  title: Stock Selection API
  description: |
    REST API for stock indicator screening, weight configuration,
    trading model selection, and portfolio rebalancing.
  version: 1.0.0
  contact:
    name: MoonBit Drawdown Framework
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://api.moonbit-drawdown.com/v1
    description: Production server

tags:
  - name: Indicators
    description: Stock indicator definitions and calculations
  - name: Screening
    description: Stock screening and filtering
  - name: Saved Screens
    description: Save and manage screen configurations
  - name: Weights
    description: Indicator weight configurations for composite scoring
  - name: Trading Models
    description: Trading model definitions
  - name: Trading Strategies
    description: Custom trading strategies and execution
  - name: Results
    description: Strategy execution history and results

paths:
  /indicators:
    get:
      tags:
        - Indicators
      summary: Get available indicators
      description: Retrieve all available stock indicators for screening
      operationId: getIndicators
      parameters:
        - name: category
          in: query
          description: Filter by category
          required: false
          schema:
            type: string
            enum: [technical, fundamental, market, sentiment, volatility]
          example: technical
        - name: tags
          in: query
          description: Filter by tags (comma-separated)
          required: false
          schema:
            type: string
          example: trend,momentum
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorListResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /indicators/{id}:
    get:
      tags:
        - Indicators
      summary: Get indicator details
      description: Get detailed information about a specific indicator
      operationId: getIndicatorById
      parameters:
        - name: id
          in: path
          required: true
          description: Indicator ID
          schema:
            type: string
          example: rsi_14
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorDetailResponse'
        '404':
          description: Indicator not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /stocks/{code}/indicators:
    get:
      tags:
        - Indicators
      summary: Get stock indicator values
      description: Get calculated indicator values for a specific stock
      operationId: getStockIndicators
      parameters:
        - name: code
          in: path
          required: true
          description: Stock code (e.g., sh.600000)
          schema:
            type: string
          example: sh.600000
        - name: indicators
          in: query
          description: Comma-separated list of indicator IDs
          required: false
          schema:
            type: string
          example: ma_20,rsi_14,pe_ratio
        - name: start
          in: query
          description: Start date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
          example: '2024-01-01'
        - name: end
          in: query
          description: End date (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
          example: '2024-03-28'
        - name: period
          in: query
          description: Number of historical periods
          required: false
          schema:
            type: integer
            default: 250
          example: 100
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockIndicatorResponse'
        '404':
          description: Stock not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /screen:
    post:
      tags:
        - Screening
      summary: Screen stocks
      description: Screen stocks based on indicator criteria and ranking rules
      operationId: screenStocks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScreenRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /screens:
    get:
      tags:
        - Saved Screens
      summary: Get saved screens
      description: Get list of saved screen configurations
      operationId: getScreens
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedScreenListResponse'
    post:
      tags:
        - Saved Screens
      summary: Save screen criteria
      description: Save a screen configuration for reuse
      operationId: createScreen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScreenRequest'
      responses:
        '201':
          description: Screen created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateScreenResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /screens/{id}:
    get:
      tags:
        - Saved Screens
      summary: Get saved screen details
      description: Get details of a specific saved screen
      operationId: getScreenById
      parameters:
        - name: id
          in: path
          required: true
          description: Screen ID
          schema:
            type: string
          example: usr_screen_001
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SavedScreenDetailResponse'
        '404':
          description: Screen not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Saved Screens
      summary: Update saved screen
      description: Update an existing screen configuration
      operationId: updateScreen
      parameters:
        - name: id
          in: path
          required: true
          description: Screen ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScreenRequest'
      responses:
        '200':
          description: Screen updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateScreenResponse'
        '404':
          description: Screen not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Saved Screens
      summary: Delete saved screen
      description: Delete a saved screen configuration
      operationId: deleteScreen
      parameters:
        - name: id
          in: path
          required: true
          description: Screen ID
          schema:
            type: string
      responses:
        '200':
          description: Screen deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteScreenResponse'
        '404':
          description: Screen not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /screens/{id}/run:
    post:
      tags:
        - Saved Screens
      summary: Run saved screen
      description: Run a saved screen and get results
      operationId: runScreen
      parameters:
        - name: id
          in: path
          required: true
          description: Screen ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreenResponse'
        '404':
          description: Screen not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /weights:
    get:
      tags:
        - Weights
      summary: Get weight configurations
      description: Get all weight configurations for composite scoring
      operationId: getWeights
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeightConfigListResponse'
    post:
      tags:
        - Weights
      summary: Create weight configuration
      description: Create a new weight configuration
      operationId: createWeight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWeightRequest'
      responses:
        '201':
          description: Weight configuration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWeightResponse'
        '400':
          description: Invalid request (weights don't sum to 1.0)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /weights/{id}:
    put:
      tags:
        - Weights
      summary: Update weight configuration
      description: Update an existing weight configuration
      operationId: updateWeight
      parameters:
        - name: id
          in: path
          required: true
          description: Weight configuration ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeightRequest'
      responses:
        '200':
          description: Weight configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateWeightResponse'
        '404':
          description: Configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Weights
      summary: Delete weight configuration
      description: Delete a weight configuration
      operationId: deleteWeight
      parameters:
        - name: id
          in: path
          required: true
          description: Weight configuration ID
          schema:
            type: string
      responses:
        '200':
          description: Weight configuration deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteWeightResponse'
        '404':
          description: Configuration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /weights/validate:
    post:
      tags:
        - Weights
      summary: Validate weights
      description: Validate that weights sum to 1.0
      operationId: validateWeights
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateWeightRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateWeightResponse'

  /trading-models:
    get:
      tags:
        - Trading Models
      summary: Get trading models
      description: Get all available trading models
      operationId: getTradingModels
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingModelListResponse'

  /trading-models/{id}:
    get:
      tags:
        - Trading Models
      summary: Get trading model details
      description: Get detailed information about a specific trading model
      operationId: getTradingModelById
      parameters:
        - name: id
          in: path
          required: true
          description: Trading model ID
          schema:
            type: string
          example: periodic_rebalance
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingModelDetailResponse'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trading-strategies:
    get:
      tags:
        - Trading Strategies
      summary: Get trading strategies
      description: Get list of user's trading strategies
      operationId: getTradingStrategies
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingStrategyListResponse'
    post:
      tags:
        - Trading Strategies
      summary: Create trading strategy
      description: Create a custom trading strategy based on a model
      operationId: createTradingStrategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTradingStrategyRequest'
      responses:
        '201':
          description: Strategy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTradingStrategyResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trading-strategies/{id}:
    get:
      tags:
        - Trading Strategies
      summary: Get trading strategy details
      description: Get details of a specific trading strategy
      operationId: getTradingStrategyById
      parameters:
        - name: id
          in: path
          required: true
          description: Strategy ID
          schema:
            type: string
          example: usr_strategy_001
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingStrategyDetailResponse'
        '404':
          description: Strategy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Trading Strategies
      summary: Update trading strategy
      description: Update an existing trading strategy
      operationId: updateTradingStrategy
      parameters:
        - name: id
          in: path
          required: true
          description: Strategy ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTradingStrategyRequest'
      responses:
        '200':
          description: Strategy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateTradingStrategyResponse'
        '404':
          description: Strategy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Trading Strategies
      summary: Delete trading strategy
      description: Delete a trading strategy
      operationId: deleteTradingStrategy
      parameters:
        - name: id
          in: path
          required: true
          description: Strategy ID
          schema:
            type: string
      responses:
        '200':
          description: Strategy deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteTradingStrategyResponse'
        '404':
          description: Strategy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trading-strategies/{id}/run:
    post:
      tags:
        - Trading Strategies
      summary: Trigger strategy run
      description: Manually trigger a strategy run
      operationId: runTradingStrategy
      parameters:
        - name: id
          in: path
          required: true
          description: Strategy ID
          schema:
            type: string
      responses:
        '200':
          description: Run started or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStrategyResponse'
        '404':
          description: Strategy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /trading-strategies/{id}/history:
    get:
      tags:
        - Results
      summary: Get strategy history
      description: Get execution history for a strategy
      operationId: getStrategyHistory
      parameters:
        - name: id
          in: path
          required: true
          description: Strategy ID
          schema:
            type: string
        - name: limit
          in: query
          description: Number of results to return
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          description: Offset for pagination
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyHistoryResponse'

  /trading-strategies/{id}/runs/{run_id}:
    get:
      tags:
        - Results
      summary: Get strategy run details
      description: Get detailed results of a specific strategy run
      operationId: getStrategyRunDetails
      parameters:
        - name: id
          in: path
          required: true
          description: Strategy ID
          schema:
            type: string
        - name: run_id
          in: path
          required: true
          description: Run ID
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StrategyRunDetailResponse'
        '404':
          description: Run not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    # Common Types
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        error:
          type: object
          properties:
            code:
              type: string
              example: INVALID_INDICATOR
            message:
              type: string
              example: Invalid indicator ID

    # Indicator Types
    IndicatorParameter:
      type: object
      properties:
        type:
          type: string
          enum: [int, float, string, bool, enum]
        default:
          oneOf:
            - type: integer
            - type: number
            - type: string
            - type: boolean
        min:
          type: number
        max:
          type: number
        options:
          type: array
          items:
            type: string
        description:
          type: string

    Indicator:
      type: object
      properties:
        id:
          type: string
          example: rsi_14
        name:
          type: string
          example: 14-Day Relative Strength Index
        category:
          type: string
          enum: [technical, fundamental, market, sentiment, volatility]
        description:
          type: string
        parameters:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/IndicatorParameter'
        output_type:
          type: string
          enum: [float, int, bool, string]
        tags:
          type: array
          items:
            type: string

    IndicatorListResponse:
      type: object
      properties:
        indicators:
          type: array
          items:
            $ref: '#/components/schemas/Indicator'
        total:
          type: integer
        categories:
          type: array
          items:
            type: string

    IndicatorDetail:
      allOf:
        - $ref: '#/components/schemas/Indicator'
        - type: object
          properties:
            formula:
              type: string
            output_range:
              type: object
              properties:
                min:
                  type: number
                max:
                  type: number
            interpretation:
              type: object
              properties:
                oversold_threshold:
                  type: number
                overbought_threshold:
                  type: number
            related_indicators:
              type: array
              items:
                type: string

    IndicatorDetailResponse:
      type: object
      properties:
        indicator:
          $ref: '#/components/schemas/IndicatorDetail'

    StockIndicatorValue:
      type: object
      properties:
        value:
          type: number
        signal:
          type: string
          enum: [bullish, bearish, neutral, overbought, oversold, undervalued, overvalued]
        history:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              value:
                type: number

    StockIndicatorResponse:
      type: object
      properties:
        stock:
          type: string
          example: sh.600000
        as_of_date:
          type: string
          format: date
        indicators:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/StockIndicatorValue'

    # Screening Types
    IndicatorFilter:
      type: object
      required:
        - id
        - operator
      properties:
        id:
          type: string
          example: pe_ratio
        operator:
          type: string
          enum: [eq, neq, gt, gte, lt, lte, between, above_price, below_price, cross_above, cross_below]
        value:
          oneOf:
            - type: number
            - type: string
            - type: boolean
        values:
          type: array
          items:
            type: number
          description: For 'between' operator

    MarketCapRange:
      type: object
      properties:
        min:
          type: number
          example: 10000000000
        max:
          type: number
          example: 500000000000

    ScreenFilters:
      type: object
      properties:
        sectors:
          type: array
          items:
            type: string
        market_cap:
          $ref: '#/components/schemas/MarketCapRange'
        exclude_st:
          type: boolean
          default: true
        exclude_new_listing:
          type: boolean
          default: true
        exchanges:
          type: array
          items:
            type: string
            enum: [sh, sz]
        industries:
          type: array
          items:
            type: string

    RankingConfig:
      type: object
      properties:
        sort_by:
          type: string
          example: composite_score
        order:
          type: string
          enum: [asc, desc]
          default: desc
        weight_config_id:
          type: string

    ScreenRequest:
      type: object
      required:
        - indicators
      properties:
        indicators:
          type: array
          items:
            $ref: '#/components/schemas/IndicatorFilter'
        filters:
          $ref: '#/components/schemas/ScreenFilters'
        ranking:
          $ref: '#/components/schemas/RankingConfig'
        limit:
          type: integer
          default: 100
          minimum: 1
          maximum: 500

    ScreenResult:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        score:
          type: number
        rank:
          type: integer
        indicators:
          type: object
          additionalProperties:
            type: number
        current_price:
          type: number
        signals:
          type: object
          additionalProperties:
            type: string
            enum: [pass, fail, neutral]

    ScreenResponse:
      type: object
      properties:
        screen_id:
          type: string
          example: scr_20240328_001
        timestamp:
          type: string
          format: date-time
        results:
          type: object
          properties:
            total_matches:
              type: integer
            returned:
              type: integer
            stocks:
              type: array
              items:
                $ref: '#/components/schemas/ScreenResult'
        criteria_applied:
          type: object
          properties:
            indicators:
              type: integer
            filters:
              type: integer
            excluded_count:
              type: integer

    # Saved Screen Types
    SavedScreen:
      type: object
      properties:
        screen_id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_public:
          type: boolean
        criteria_summary:
          type: object
          properties:
            indicator_count:
              type: integer
            filter_count:
              type: integer

    SavedScreenListResponse:
      type: object
      properties:
        screens:
          type: array
          items:
            $ref: '#/components/schemas/SavedScreen'
        total:
          type: integer

    SavedScreenDetail:
      allOf:
        - $ref: '#/components/schemas/SavedScreen'
        - type: object
          properties:
            criteria:
              $ref: '#/components/schemas/ScreenRequest'
            last_run:
              type: string
              format: date-time
            last_results_count:
              type: integer

    SavedScreenDetailResponse:
      type: object
      properties:
        screen:
          $ref: '#/components/schemas/SavedScreenDetail'

    CreateScreenRequest:
      type: object
      required:
        - name
        - criteria
      properties:
        name:
          type: string
        description:
          type: string
        criteria:
          $ref: '#/components/schemas/ScreenRequest'
        is_public:
          type: boolean
          default: false

    CreateScreenResponse:
      type: object
      properties:
        status:
          type: string
          enum: [created]
        screen_id:
          type: string
        name:
          type: string

    UpdateScreenRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        criteria:
          $ref: '#/components/schemas/ScreenRequest'
        is_public:
          type: boolean

    UpdateScreenResponse:
      type: object
      properties:
        status:
          type: string
          enum: [updated]
        screen_id:
          type: string

    DeleteScreenResponse:
      type: object
      properties:
        status:
          type: string
          enum: [deleted]
        screen_id:
          type: string

    # Weight Configuration Types
    WeightConfig:
      type: object
      properties:
        config_id:
          type: string
        name:
          type: string
        description:
          type: string
        is_default:
          type: boolean
        weights:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WeightConfigListResponse:
      type: object
      properties:
        configurations:
          type: array
          items:
            $ref: '#/components/schemas/WeightConfig'
        total:
          type: integer

    CreateWeightRequest:
      type: object
      required:
        - name
        - weights
      properties:
        name:
          type: string
        description:
          type: string
        weights:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 1

