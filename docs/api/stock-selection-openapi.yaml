            type: number

    # Trading Model Types
    TradingModelParameter:
      type: object
      properties:
        type:
          type: string
          enum: [int, float, string, bool, enum, array]
        options:
          type: array
          items:
            type: string
        default:
          oneOf:
            - type: integer
            - type: number
            - type: string
            - type: boolean
        min:
          type: number
        max:
          type: number
        description:
          type: string

    TradingModel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [rebalancing, conditional, strategy]
        parameters:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TradingModelParameter'

    TradingModelListResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/TradingModel'
        total:
          type: integer

    TradingModelDetail:
      allOf:
        - $ref: '#/components/schemas/TradingModel'
        - type: object
          properties:
            rebalance_logic:
              type: object
              properties:
                steps:
                  type: array
                  items:
                    type: string
            risk_controls:
              type: object
              additionalProperties:
                oneOf:
                  - type: number
                  - type: boolean

    TradingModelDetailResponse:
      type: object
      properties:
        model:
          $ref: '#/components/schemas/TradingModelDetail'

    # Trading Strategy Types
    TradingStrategy:
      type: object
      properties:
