<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>量化回撤框架</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 3rem;
      text-align: center;
    }
    .nav-container {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav-btn {
      display: block;
      padding: 1.5rem 3rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }
    .nav-btn:active {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <h1>量化回撤框架</h1>
  <div class="nav-container">
    <a href="/screener.html" class="nav-btn">📊 股票筛选器</a>
    <a href="/stock_strategy.html" class="nav-btn">⚙️ 策略配置</a>
    <a href="/trading-models.html" class="nav-btn">📈 交易模型</a>
  </div>
</body>
</html>
