<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票筛选器 - 量化回撤框架</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="components/indicator-card.css">
  <link rel="stylesheet" href="components/filter-controls.css">
  <link rel="stylesheet" href="screener.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>股票筛选器</h1>
      <nav>
        <button class="nav-btn" data-link="../index.html">首页</button>
        <button class="nav-btn active" data-link="screener.html">股票筛选器</button>
        <button class="nav-btn" data-link="stock_strategy.html">策略配置</button>
        <button class="nav-btn" data-link="trading-models.html">交易模型</button>
      </nav>
    </header>

    <main>
      <!-- Main Content Area -->
      <div class="screener-layout">
        <!-- Left Panel: Indicator Selection -->
        <aside class="screener-panel screener-indicators-panel">
          <div class="panel-header">
            <h3>选股指标</h3>
            <div class="panel-actions">
              <input type="text" class="indicator-search" placeholder="搜索指标..." id="indicator-search">
            </div>
          </div>

          <!-- Category Tabs -->
          <div class="category-tabs">
            <button class="tab-btn active" data-category="market">行情指标</button>
            <button class="tab-btn" data-category="tech">技术指标</button>
          </div>

          <!-- Indicators Grid -->
          <div class="indicators-container">
            <div class="indicator-grid" id="indicator-grid">
              <!-- Dynamically populated -->
            </div>
          </div>

          <!-- Selected Indicators -->
          <div class="selected-indicators-section">
            <div class="selected-header">
              <h4>已选指标 (<span id="selected-count">0</span>)</h4>
              <button class="btn-clear-selected" id="btn-clear-selected">清空</button>
            </div>
            <div class="selected-indicators" id="selected-indicators">
              <div class="selected-empty" id="selected-empty">
                <span class="empty-icon">📋</span>
                <span class="empty-text">点击左侧指标添加到筛选条件</span>
              </div>
            </div>
          </div>
        </aside>

        <!-- Center Panel: Filter Configuration -->
        <section class="screener-panel screener-filters-panel">
          <div class="panel-header">
            <h3>筛选条件配置</h3>
            <div class="panel-actions">
              <button class="btn-add-condition" id="btn-add-condition">+ 添加条件</button>
              <button class="btn-save-config" id="btn-save-config">保存配置</button>
            </div>
          </div>

          <!-- Date Range Filter -->
          <div class="date-range-section">
            <div class="section-header">
              <h4>数据日期范围</h4>
              <label class="date-mode-toggle">
                <input type="checkbox" id="date-mode-toggle" checked>
                <span class="toggle-text">范围模式</span>
              </label>
            </div>
            <div class="date-range-controls">
              <div class="date-input-group" id="range-date-group">
                <div class="date-input-wrapper">
                  <label class="date-label">开始日期:</label>
                  <input type="date" class="date-input" id="start-date" min="2026-01-01" max="2026-03-27" value="2026-01-01">
                </div>
                <div class="date-input-wrapper">
                  <label class="date-label">结束日期:</label>
                  <input type="date" class="date-input" id="end-date" min="2026-01-01" max="2026-03-27" value="2026-03-27">
                </div>
              </div>
              <div class="date-input-group" id="single-date-group" style="display: none;">
                <label class="date-label">查询日期:</label>
                <input type="date" class="date-input" id="query-date" min="2026-01-01" max="2026-03-27" value="2026-03-27">
              </div>
            </div>
          </div>

          <!-- Filter Controls Container -->
          <div class="filters-container" id="filters-container">
            <div class="filters-empty" id="filters-empty">
              <span class="empty-icon">⚙️</span>
              <span class="empty-text">暂无筛选条件，请添加指标后配置</span>
            </div>
          </div>

          <!-- Weight Configuration -->
          <div class="weight-config-section" id="weight-config-section" style="display: none;">
            <div class="section-header">
              <h4>指标权重配置</h4>
              <span class="help-text">权重用于多指标综合排名，总和应为 100%</span>
            </div>
            <div class="weight-config-list" id="weight-config-list">
              <!-- Dynamically populated -->
            </div>
            <div class="weight-config-actions">
              <button class="btn-auto-balance" id="btn-auto-balance">自动平衡</button>
              <span class="weight-total-display">总权重：<span id="total-weight-display">0%</span></span>
            </div>
          </div>
        </section>

        <!-- Right Panel: Results -->
        <aside class="screener-panel screener-results-panel">
          <div class="panel-header">
            <h3>筛选结果</h3>
            <div class="panel-actions">
              <button class="btn-run-screen" id="btn-run-screen">运行筛选</button>
            </div>
          </div>

          <!-- Results Stats -->
          <div class="results-stats" id="results-stats" style="display: none;">
            <div class="stat-item">
              <span class="stat-label">符合条件的股票</span>
              <span class="stat-value" id="result-count">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">筛选时间</span>
              <span class="stat-value" id="screen-time">--</span>
            </div>
          </div>

          <!-- Results Table -->
          <div class="results-table-container" id="results-table-container">
            <div class="results-empty" id="results-empty">
              <span class="empty-icon">📊</span>
              <span class="empty-text">点击"运行筛选"查看结果</span>
            </div>
            <table class="results-table" id="results-table" style="display: none;">
              <thead>
                <tr>
                  <th class="col-rank">排名</th>
                  <th class="col-code">代码</th>
                  <th class="col-name">名称</th>
                  <th class="col-price">收盘价</th>
                  <th class="col-volume">成交量 (万股)</th>
                  <th class="col-amount">成交额 (万元)</th>
                  <th class="col-turn">换手率 (%)</th>
                  <th class="col-ma5">5 日均线</th>
                  <th class="col-ma10">10 日均线</th>
                  <th class="col-score">综合得分</th>
                  <th class="col-action">操作</th>
                </tr>
              </thead>
              <tbody id="results-body">
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>

          <!-- Results Actions -->
          <div class="results-actions" id="results-actions" style="display: none;">
            <div class="results-limit-control">
              <label class="results-limit-label">显示数量:</label>
              <select class="results-limit-select" id="results-limit-select">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
                <option value="40">40</option>
                <option value="50" selected>50</option>
                <option value="all">全部</option>
              </select>
            </div>
            <button class="btn-export" id="btn-export">导出数据</button>
            <button class="btn-add-to-watchlist" id="btn-add-to-watchlist">加入观察</button>
          </div>
        </aside>
      </div>
    </main>

    <footer>
      <p>量化回撤框架 v0.1.0</p>
    </footer>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay" style="display: none;">
    <div class="spinner"></div>
    <p>正在筛选...</p>
  </div>

  <script type="module" src="components/indicator-card.js?v=20260329"></script>
  <script type="module" src="components/filter-controls.js?v=20260329"></script>
  <script type="module" src="screener.js?v=20260329"></script>
</body>
</html>
